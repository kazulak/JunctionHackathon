# Minimal IQM hardware baseline.
#
# Requirements:
# - IQM_TOKEN must be set in your environment, or pass token in backend.options.
# - This uses Qiskit's default transpilation/routing, not custom Emerald mapping.
# - Noise parameters are not sent to hardware. They build the Stim detector error
#   model used by PyMatching after hardware measurements come back.

experiment:
  name: iqm_surface_d3_baseline
  description: "Minimal surface-code memory experiment on IQM hardware."
  seed: 1

code:
  family: surface_code
  distance: 3
  rounds: 1
  basis: both
  reset_mode: reset

backend:
  name: iqm_hardware
  shots: 100
  options:
    server_url: https://resonance.meetiqm.com
    quantum_computer: emerald
    optimization_level: 3
    # Authentication:
    # Prefer setting IQM_TOKEN in your shell or .env.
    # Do not also put token here when IQM_TOKEN is set.
    # token: your-token-here

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.003
    two_qubit_error: 0.003
    measurement_error: 0.003
    reset_error: 0.003
    idle_error: 0.003

decoder:
  name: pymatching
  options: {}

mapping:
  strategy: none
  hardware_patch: null

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

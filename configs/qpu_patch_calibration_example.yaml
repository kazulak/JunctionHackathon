# Example full-chip calibration/topology format for patch selection.
# Replace this file with current IQM Resonance data for the whole QPU.
#
# Qiskit indices can be explicit. If omitted for labels like QB17, the pipeline
# assumes Qiskit index = 16.

qpu: example_grid

qubits:
  QB1:  {row: 0, col: 0, index: 0,  errors: {one_qubit: 0.003, measurement: 0.040, reset: 0.030, idle: 0.001}}
  QB2:  {row: 0, col: 1, index: 1,  errors: {one_qubit: 0.003, measurement: 0.040, reset: 0.030, idle: 0.001}}

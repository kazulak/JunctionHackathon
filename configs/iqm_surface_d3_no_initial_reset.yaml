# Minimal IQM hardware baseline without explicit reset gates.
#
# Requirements:
# - IQM_TOKEN must be set in your environment, or pass token in backend.options.
# - This uses the real Emerald calibration dump to choose a native d=3 patch.
# - Noise parameters are not sent to hardware. They build the Stim detector error
#   model used by PyMatching after hardware measurements come back.
# - omit_initial_resets removes leading reset gates.
# - omit_repeated_resets removes syndrome-round reset gates and converts physical
#   measurement records into virtual reset-style records before decoding.

experiment:
  name: iqm_surface_d3_no_reset_virtualized
  description: "Distance-3 Emerald run with no active resets and virtualized measurement records."
  seed: 1

code:
  family: surface_code
  distance: 3
  rounds: 1
  basis: both
  reset_mode: reset

backend:
  name: iqm_hardware
  shots: 100
  options:
    server_url: https://resonance.meetiqm.com
    quantum_computer: emerald
    optimization_level: 3
    batch_submit: true
    omit_initial_resets: true
    omit_repeated_resets: true

    # Authentication:
    # Prefer setting IQM_TOKEN in your shell or .env.
    # Do not also put token here when IQM_TOKEN is set.
    # token: your-token-here

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.003
    two_qubit_error: 0.003
    measurement_error: 0.003
    reset_error: 0.003
    idle_error: 0.003

decoder:
  name: pymatching
  options:
    noise_sweep_probabilities:
      - 0.001
      - 0.003
      - 0.01
      - 0.02
      - 0.05
      - 0.1
      - 0.2
      - 0.3

mapping:
  strategy: calibration_best_patch
  calibration_file: configs/2026-06-06T06_08_52.470451Z.json
  weights:
    one_qubit: 1.0
    two_qubit: 1.0
    measurement: 1.0
    reset: 1.0
    idle: 1.0
    qnd: 1.0
    max_coupler: 10.0
  options:
    exclude_qubits:
      - QB9
      - QB25
      - QB41
      - QB46
      - QB47
  hardware_patch:
    # Pinned from the successful one-round no-initial-reset run:
    # results/iqm_surface_d3_r1_no_initial_reset/20260606T201303Z
    stim_to_hardware:
      "1": QB31
      "2": QB39
      "3": QB38
      "5": QB45
      "8": QB22
      "9": QB30
      "10": QB29
      "11": QB37
      "12": QB36
      "13": QB44
      "14": QB14
      "15": QB13
      "16": QB21
      "17": QB20
      "18": QB28
      "19": QB27
      "25": QB19

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

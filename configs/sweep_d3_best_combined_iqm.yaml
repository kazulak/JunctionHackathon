# Best reported-LER IQM hardware recipe.
#
# This is the one to run if the goal is the lowest reported LER with the current
# pipeline. It combines:
# - d3 rotated surface-code memory Z/X
# - Emerald calibration-selected fixed patch
# - omitted initial resets, which helped the hackathon hardware runs
# - batched IQM submission
# - attempted dynamical decoupling after transpilation
# - low-syndrome postselection plus the full PyMatching candidate set
#
# Important: postselection discards shots. This is best for reported LER and
# diagnostics, not a full-shot logical-memory claim.
#
# Run:
#   python scripts/sweep_rounds.py configs/sweep_d3_best_combined_iqm.yaml --rounds 1 7 4

experiment:
  name: sweep_d3_best_combined_iqm
  description: "D3 IQM hardware run with best combined reported-LER route."
  seed: 1

code:
  family: surface_code_iqm
  distance: 3
  rounds: 1
  basis: both
  reset_mode: reset

backend:
  name: iqm_hardware
  shots: 2000
  options:
    server_url: https://resonance.meetiqm.com
    quantum_computer: emerald
    optimization_level: 3
    seed_transpiler: 11
    routing_method: sabre
    batch_submit: true
    omit_initial_resets: true
    omit_repeated_resets: false
    dynamical_decoupling: true
    dd_sequence: xx

noise:
  model: iqm_calibration
  calibration_file: configs/2026-06-06T06_08_52.470451Z.json
  options:
    apply_idle: true
    route_error_multiplier: 1.0
    qnd_scale: 0.0
    idle_scale: 0.5

decoder:
  name: pymatching_auto
  options:
    postselect_weight_quantile: 0.25
    include_no_correction: true
    include_correlated_matching: true
    include_matching_ensembles: true
    gated_no_correction_quantiles:
      - 0.25
      - 0.5
      - 0.75
    uniform_probabilities:
      - 0.001
      - 0.003
      - 0.005
      - 0.01
      - 0.02
      - 0.05
      - 0.1
      - 0.2
      - 0.3

mapping:
  strategy: calibration_best_patch
  calibration_file: configs/2026-06-06T06_08_52.470451Z.json
  weights:
    one_qubit: 1.0
    two_qubit: 1.0
    measurement: 1.0
    reset: 1.0
    idle: 1.0
    qnd: 1.0
    max_coupler: 10.0
  options:
    exclude_qubits:
      - QB9
      - QB25
      - QB41
      - QB46
      - QB47
  hardware_patch:
    stim_to_hardware:
      "1": QB31
      "2": QB39
      "3": QB38
      "5": QB45
      "8": QB22
      "9": QB30
      "10": QB29
      "11": QB37
      "12": QB36
      "13": QB44
      "14": QB14
      "15": QB13
      "16": QB21
      "17": QB20
      "18": QB28
      "19": QB27
      "25": QB19

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

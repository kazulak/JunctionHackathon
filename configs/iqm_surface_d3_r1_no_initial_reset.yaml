# One-round IQM hardware sanity run without explicit initial reset gates.
#
# Purpose:
# - Test whether IQM explicit reset gates are damaging the shortest d=3 circuit.
# - Stim still defines the ideal reset/preparation semantics.
# - Qiskit hardware execution relies on the QPU shot initialization for initial |0>.

experiment:
  name: iqm_surface_d3_r1_no_initial_reset
  description: "Distance-3 one-round Emerald run with initial reset gates omitted."
  seed: 1

code:
  family: surface_code
  distance: 3
  rounds: 1
  basis: both
  reset_mode: reset

backend:
  name: iqm_hardware
  shots: 1000
  options:
    server_url: https://resonance.meetiqm.com
    quantum_computer: emerald
    optimization_level: 3
    batch_submit: true
    omit_initial_resets: true

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.003
    two_qubit_error: 0.003
    measurement_error: 0.003
    reset_error: 0.003
    idle_error: 0.003

decoder:
  name: pymatching
  options: {}

mapping:
  strategy: calibration_best_patch
  calibration_file: configs/2026-06-06T06_08_52.470451Z.json
  weights:
    one_qubit: 1.0
    two_qubit: 1.0
    measurement: 1.0
    reset: 1.0
    idle: 1.0
    qnd: 1.0
    max_coupler: 10.0
  options:
    exclude_qubits:
      - QB9
      - QB25
      - QB41
      - QB46
      - QB47
  hardware_patch: null

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

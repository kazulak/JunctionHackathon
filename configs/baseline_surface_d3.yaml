experiment:
  name: baseline_surface_d3
  description: "Simulator baseline for distance-3 rotated surface code."
  seed: 1234

code:
  family: surface_code
  distance: 3
  rounds: 3
  basis: memory_z
  reset_mode: reset

backend:
  name: simulator
  shots: 1000

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.001
    two_qubit_error: 0.005
    measurement_error: 0.002
    reset_error: 0.002
    idle_error: 0.001

decoder:
  name: pymatching
  options:
    use_detector_error_model: true

mapping:
  strategy: none
  hardware_patch: null

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

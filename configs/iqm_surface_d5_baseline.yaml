# Minimal IQM hardware baseline.
#
# Requirements:
# - IQM_TOKEN must be set in your environment, or pass token in backend.options.
# - The current Emerald calibration dump does not contain a native d=5 surface-code
#   interaction graph. This config therefore uses a routed calibration layout:
#   pick a good 49-qubit initial_layout, then let Qiskit route missing edges.
# - Noise parameters are not sent to hardware. They build the Stim detector error
#   model used by PyMatching after hardware measurements come back.

experiment:
  name: iqm_surface_d5_baseline
  description: "Distance-5 surface-code memory experiment on IQM hardware."
  seed: 1

code:
  family: surface_code
  distance: 5
  rounds: 5
  basis: memory_z
  reset_mode: reset

backend:
  name: iqm_hardware
  shots: 1000
  options:
    server_url: https://resonance.meetiqm.com
    quantum_computer: emerald
    optimization_level: 3
    # Authentication:
    # Prefer setting IQM_TOKEN in your shell or .env.
    # Do not also put token here when IQM_TOKEN is set.
    # token: your-token-here

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.003
    two_qubit_error: 0.003
    measurement_error: 0.003
    reset_error: 0.003
    idle_error: 0.003

decoder:
  name: pymatching
  options: {}

mapping:
  strategy: calibration_routed_layout
  calibration_file: configs/2026-06-06T06_08_52.470451Z.json
  weights:
    one_qubit: 1.0
    two_qubit: 1.0
    measurement: 1.0
    reset: 1.0
    idle: 1.0
    qnd: 1.0
    max_coupler: 10.0
    route_distance: 0.2
  options:
    seed: 1
    max_iterations: 5000
    exclude_qubits:
      - QB9
      - QB25
      - QB41
      - QB46
      - QB47
  hardware_patch: null

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true

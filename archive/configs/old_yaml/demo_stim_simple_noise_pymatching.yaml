# Same noisy simulator as demo_stim_simple_noise.yaml, but decoded with PyMatching.
# This is the first real decoded simulator baseline.

experiment:
  name: demo_stim_simple_noise_pymatching
  description: "Stim noisy simulator with PyMatching decoder."
  seed: 1

code:
  family: surface_code
  distance: 3
  rounds: 15
  basis: both
  reset_mode: reset

backend:
  name: simulator
  shots: 1000
  options:
    seed: 1

noise:
  model: simple_depolarizing
  parameters:
    one_qubit_error: 0.003
    two_qubit_error: 0.003
    measurement_error: 0.003
    reset_error: 0.003
    idle_error: 0.003

decoder:
  name: pymatching
  options: {}

mapping:
  strategy: none
  hardware_patch: null

artifacts:
  root: results
  save_raw_measurements: true
  save_syndromes: true
  save_report: true
